<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto con EmailJS</title>
</head>
<body>

    <!-- Tu Formulario de contacto -->
    <form id="contact-form">
        <label>Nombre:</label>
        <input type="text" id="user_name" name="user_name" required>
        
        <label>Correo Electrónico:</label>
        <input type="email" id="user_email" name="user_email" required>
        
        <label>Mensaje:</label>
        <textarea id="user_message" name="user_message" required>Prueba de correo HTML</textarea>
        
        <button type="submit">Enviar Mensaje</button>
    </form>

    <!-- 1. Incluir la librería oficial de EmailJS -->
    <!--<script type="text/javascript" src="https://jsdelivr.net"></script>-->
    <script src="js/emailjs.min.js"></script>
    
    <!-- 2. Tu archivo JavaScript propio -->
    <script src="js/script.js"></script>
</body>
</html>
